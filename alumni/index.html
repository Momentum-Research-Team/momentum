  <script>
    const membersData = {
      3: {"회장": ["임준수"],"팀장": ["김경훈","이민우","박지현","최서연"],"기획팀": ["정다은","강현우","한수민","조예은"],"연구팀": ["윤성민","임도현","김서준","이하은","박우진","최지아","정민재","강소율"],"디자인팀": ["한민지","조현서","윤지유","임도윤"],"운영팀": ["김유진","이성현","박서영","최재원","정하윤","강태민","한채원","조민규","윤서진"]},
      2: {"회장": ["박철수"],"팀장": ["이영희","김민재","최동현","정은지"],"기획팀": ["강지웅","조유리","윤재희","임성우"],"연구팀": ["김다원","이진우","박수빈","최현우","정다원","강지민","한상현","조하은"],"디자인팀": ["윤성준","임지선","김태현","이민선"],"운영팀": ["박정우","최수아","정승우","강다해","한지혁","조은하","윤동현","임지우","김현서"]},
      1: {"회장": ["홍길동"],"팀장": ["성춘향","이몽룡","이순신","강감찬"],"기획팀": ["유관순","신사임당","안중근","안창호"],"연구팀": ["박찬호","박세리","손흥민","김연아","류현진","봉준호","송강호","김정국"],"디자인팀": ["이지은","유재석","신동엽","강호동"],"운영팀": ["이경규","김태희","김현빈","손예진","김공유","김수현","송중기","송혜교","안재현"]}
    };
    
    // Background colors corresponding to Staff teams
    const colors = {
      '회장': '#2962ff',
      '팀장': '#2962ff',
      '기획팀': '#2962ff',
      '연구팀': '#2962ff',
      '디자인팀': '#76b900',  // Vibrant Green
      '운영팀': '#37474f'    // Slate Charcoal
    };

    function renderMembers(gen) {
      const container = document.getElementById('members-widget-container');
      if (!container) return;
      
      // Clear container and trigger animation
      container.style.animation = 'none';
      container.offsetHeight; /* trigger reflow */
      container.style.animation = 'fadeInUp 0.5s ease forwards';
      container.innerHTML = '';
      
      const genData = membersData[gen];
      if (!genData) return;
      
      let html = '';
      
      const categories = ['회장', '팀장', '기획팀', '연구팀', '디자인팀', '운영팀'];
      
      categories.forEach(cat => {
        const names = genData[cat];
        if (!names || names.length === 0) return;
        
        // Output section heading
        html += `
          <div class="col-md-12" style="margin-top: 2rem;">
            <h2 class="mb-4" style="font-size: 1.6rem; font-weight: 700; border-left: 4px solid #2962ff; padding-left: 0.7rem;">
              ${cat} <span style="font-size: 0.9rem; font-weight: 400; color: #888;">(${names.length})</span>
            </h2>
          </div>
        `;
        
        // Output members row
        const bg = colors[cat] || '#2962ff';
        const roleName = cat === '회장' ? '회장' : cat === '팀장' ? '팀장' : `${cat}원`;
        
        names.forEach(name => {
          const initial = name.charAt(0);
          html += `
            <div class="col-12 col-sm-auto people-person text-center">
              <div class="portrait" style="width: 150px; height: 150px; border-radius: 50%; background-color: ${bg}; display: flex; align-items: center; justify-content: center; font-size: 55px; font-weight: bold; color: white; margin: 0 auto 0.6rem; box-shadow: 0 4px 10px rgba(0,0,0,0.06); transition: transform 0.25s ease;">
                ${initial}
              </div>
              <div class="portrait-title">
                <h2 style="font-size: 1.1rem; font-weight: 700; color: #22385f; margin: 0 0 0.2rem;">${name}</h2>
                <h3 style="font-size: 0.85rem; font-weight: 400; color: #666; margin: 0;">${roleName}</h3>
              </div>
            </div>
          `;
        });
      });
      
      container.innerHTML = html;
      
      // Add hover effect animations to the circular initials
      const portraits = container.querySelectorAll('.portrait');
      portraits.forEach(p => {
        p.addEventListener('mouseenter', () => p.style.transform = 'scale(1.05) rotate(3deg)');
        p.addEventListener('mouseleave', () => p.style.transform = 'scale(1)');
      });
    }

    function switchGeneration(gen) {
      // Toggle active class on tab buttons
      const buttons = document.querySelectorAll('.tab-btn');
      buttons.forEach(btn => {
        const isActive = btn.getAttribute('onclick').includes(gen);
        btn.classList.toggle('active', isActive);
      });
      
      renderMembers(gen);
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
      renderMembers(3);
    });
  </script>
