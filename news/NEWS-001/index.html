  <script>
    function getNewsValue(row, keys) {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') {
          return String(row[key]).trim();
        }
      }
      return '';
    }

    function escapeNewsHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeNewsId(value) {
      return String(value || '').trim().replace(/_/g, '-').toUpperCase();
    }

    function parseNewsDateValue(value) {
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return value;
      }

      const raw = String(value || '').trim();
      if (!raw) return null;

      const gvizMatch = raw.match(/^Date\((\d+),\s*(\d+),\s*(\d+)(?:,\s*(\d+),\s*(\d+),\s*(\d+))?\)$/i);
      if (gvizMatch) {
        const year = Number(gvizMatch[1]);
        const month = Number(gvizMatch[2]);
        const day = Number(gvizMatch[3]);
        const hour = Number(gvizMatch[4] || 0);
        const minute = Number(gvizMatch[5] || 0);
        const second = Number(gvizMatch[6] || 0);
        const parsed = new Date(year, month, day, hour, minute, second);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
      }

      const normalized = raw.replace(/\./g, '-').replace(/\//g, '-');
      const parsed = new Date(normalized);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatNewsDate(value) {
      const parsed = parseNewsDateValue(value);
      if (!parsed) return String(value || '').trim();
      return parsed.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function getCurrentNewsId() {
      const match = window.location.pathname.match(/\/news\/([^\/]+)/i);
      if (!match) return '';
      return normalizeNewsId(decodeURIComponent(match[1] || ''));
    }

    function formatNewsContent(rawContent) {
      const text = String(rawContent || '').trim();
      if (!text) {
        return '<p>Content coming soon.</p>';
      }

      return text
        .split(/\n{2,}/)
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => `<p>${escapeNewsHtml(part).replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    function revealNewsArticle() {
      const skeleton = document.getElementById('news-sheet-skeleton');
      if (skeleton && skeleton.parentNode) {
        skeleton.parentNode.removeChild(skeleton);
      }
      const article = document.getElementById('news-article');
      if (article) {
        article.classList.remove('news-loading-hidden');
      }
    }

    async function renderNewsDetail() {
      const article = document.getElementById('news-article');
      const titleEl = document.getElementById('news-title');
      const dateEl = document.getElementById('news-date');
      const contentEl = document.getElementById('news-content');
      if (!titleEl || !dateEl || !contentEl) {
        revealNewsArticle();
        return;
      }
      if (typeof getNews !== 'function') {
        contentEl.innerHTML = '<p>Unable to sync news right now.</p>';
        revealNewsArticle();
        return;
      }

      const currentNewsId = getCurrentNewsId();
      if (currentNewsId) {
        titleEl.textContent = `News ${currentNewsId}`;
      }

      try {
        const rows = await getNews();
        if (!Array.isArray(rows) || rows.length === 0) {
          contentEl.innerHTML = '<p>Content coming soon.</p>';
          return;
        }

        const matchedRow = rows.find((row) => {
          const rowId = normalizeNewsId(getNewsValue(row, ['News_ID', 'News ID', 'news_id', 'Column_0']));
          return rowId && rowId === currentNewsId;
        });

        if (!matchedRow) {
          contentEl.innerHTML = '<p>Content coming soon.</p>';
          return;
        }

        const title = getNewsValue(matchedRow, ['Title', 'title', 'Column_1']) || `News ${currentNewsId}`;
        const dateRaw = getNewsValue(matchedRow, ['Date', 'date', 'Column_2']);
        const content = getNewsValue(matchedRow, ['Content', 'content', 'Column_3']);

        titleEl.textContent = title;
        dateEl.textContent = formatNewsDate(dateRaw);
        contentEl.innerHTML = formatNewsContent(content);
        document.title = `${title} | MOMENTUM`;
      } catch (err) {
        console.error('Failed to render news detail:', err);
        contentEl.innerHTML = '<p>Content coming soon.</p>';
      } finally {
        if (article) {
          article.classList.remove('news-loading-hidden');
        }
        revealNewsArticle();
      }
    }

    document.addEventListener('DOMContentLoaded', renderNewsDetail);
  </script>
