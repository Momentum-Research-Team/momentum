  <script>
    function escapeNewsHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getNewsValue(row, keys) {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') {
          return String(row[key]).trim();
        }
      }
      return '';
    }

    function normalizeNewsId(value) {
      return String(value || '').trim().replace(/_/g, '-').toUpperCase();
    }

    function parseNewsDateValue(value) {
      const raw = String(value || '').trim();
      if (!raw) return null;
      const gvizMatch = raw.match(/^Date\((\d+),\s*(\d+),\s*(\d+)\)$/i);
      if (gvizMatch) {
        const parsed = new Date(Number(gvizMatch[1]), Number(gvizMatch[2]), Number(gvizMatch[3]));
        return Number.isNaN(parsed.getTime()) ? null : parsed;
      }
      const parsed = new Date(raw.replace(/\./g, '-').replace(/\//g, '-'));
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatNewsDate(value) {
      const parsed = parseNewsDateValue(value);
      if (!parsed) return String(value || '').trim();
      return parsed.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function buildNewsItem(row) {
      const newsId = normalizeNewsId(getNewsValue(row, ['News_ID', 'News ID', 'news_id', 'Column_0']));
      const title = getNewsValue(row, ['Title', 'title', 'Column_1']);
      const dateText = formatNewsDate(getNewsValue(row, ['Date', 'date', 'Column_2']));
      if (!title || !newsId) return '';
      const url = `/momentum/news/${encodeURIComponent(newsId)}/index.html`;

      return `<div class="media stream-item"><div class="media-body"><h3 class="news-item-title"><a href="${escapeNewsHtml(url)}">${escapeNewsHtml(title)}</a></h3></div><div class="news-item-date">${escapeNewsHtml(dateText)}</div></div>`;
    }

    async function renderNewsList() {
      const root = document.getElementById('news-list-dynamic');
      if (!root) return;
      if (typeof getNews !== 'function') {
        root.innerHTML = '<div class="media stream-item"><div class="media-body"><h3 class="news-item-title">Unable to sync news right now.</h3></div></div>';
        return;
      }
      try {
        const rows = await getNews();
        if (!Array.isArray(rows) || rows.length === 0) {
          root.innerHTML = '<div class="media stream-item"><div class="media-body"><h3 class="news-item-title">No news available.</h3></div></div>';
          return;
        }

        const ordered = rows
          .map((row, idx) => ({ row, idx, date: parseNewsDateValue(getNewsValue(row, ['Date', 'date', 'Column_2'])) }))
          .sort((a, b) => {
            const at = a.date ? a.date.getTime() : Number.NEGATIVE_INFINITY;
            const bt = b.date ? b.date.getTime() : Number.NEGATIVE_INFINITY;
            if (at !== bt) return bt - at;
            return b.idx - a.idx;
          })
          .map(item => item.row);

        const html = ordered.map(buildNewsItem).filter(Boolean).join('');
        root.innerHTML = html || '<div class="media stream-item"><div class="media-body"><h3 class="news-item-title">No news available.</h3></div></div>';
      } catch (err) {
        console.error('Failed to render news list:', err);
      }
    }

    renderNewsList();
  </script>
